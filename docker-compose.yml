services:
  frontend:
    build: ./frontend
    ports:
      - "3000:5173"
    environment:
      - VITE_SERVER_URI=http://localhost:9000
    depends_on:
      - backend



  backend:
    build: ./backend
    environment:
      - MONGODB_ADDR=${MONGO_API}
      - PORT=9000
    ports:
      - "9000:9000"



